services:
  # Jaeger v2 — distributed tracing UI + OTel collector
  jaeger:
    image: jaegertracing/jaeger:latest
    command: ["--config", "/etc/jaeger/config.yaml"]
    volumes:
      - ./jaeger-config.yaml:/etc/jaeger/config.yaml:ro
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    ports:
      - "${API_PORT:-8888}:8888"
    environment:
      - API_PORT=8888
      - API_HOST=0.0.0.0
      - ALLOWED_ORIGINS=*
      - DATABASE_URL=file:./data/app.db
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    depends_on:
      - jaeger
    healthcheck:
      test: ["CMD", "node", "--import", "tsx", "packages/backend/healthcheck.ts"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      - BACKEND_URL=http://backend:8888
    depends_on:
      backend:
        condition: service_healthy
