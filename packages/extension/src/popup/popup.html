<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>Recipe Import</h1>

  <!-- Settings -->
  <section id="settings-section">
    <h2>AI Provider</h2>
    <div class="row">
      <div>
        <label for="provider-select">Provider</label>
        <select id="provider-select">
          <option value="anthropic">Anthropic</option>
          <option value="openai">OpenAI</option>
          <option value="google">Google</option>
          <option value="ollama">Ollama (local)</option>
          <option value="ollama-cloud">Ollama Cloud</option>
        </select>
      </div>
      <div>
        <label for="model-select">Model</label>
        <select id="model-select"></select>
      </div>
    </div>

    <div>
      <label for="api-key-input">
        <span class="provider-status" id="key-status"></span>
        API Key
      </label>
      <div class="row">
        <input type="password" id="api-key-input" placeholder="sk-ant-...">
        <button class="btn-small btn-save" id="save-key-btn">Save</button>
      </div>
    </div>

    <div id="ollama-url-row">
      <label for="ollama-url-input">Ollama Base URL</label>
      <input type="url" id="ollama-url-input" placeholder="http://localhost:11434/v1">
    </div>
  </section>

  <!-- Bluesky auth (app password) -->
  <section id="atproto-section">
    <h2>Bluesky Account</h2>
    <div id="atproto-signed-out">
      <p class="help">
        Sign in with a Bluesky app password to publish recipes to your PDS.
        Create a dedicated password at
        <a href="https://bsky.app/settings/app-passwords" target="_blank" rel="noopener">bsky.app &rarr; Settings &rarr; App Passwords</a>
        and name it <strong>Hob Recipe Extension</strong> so you can revoke it independently.
      </p>
      <div>
        <label for="atproto-handle-input">Handle</label>
        <input type="text" id="atproto-handle-input" placeholder="alice.bsky.social" autocomplete="username">
      </div>
      <div>
        <label for="atproto-password-input">App password</label>
        <input type="password" id="atproto-password-input" placeholder="xxxx-xxxx-xxxx-xxxx" autocomplete="current-password">
      </div>
      <div>
        <label for="atproto-service-input">Service URL (advanced)</label>
        <input type="url" id="atproto-service-input" placeholder="https://bsky.social">
      </div>
      <button class="btn-primary" id="atproto-signin-btn">Sign in</button>
      <div id="atproto-status"></div>
    </div>
    <div id="atproto-signed-in" hidden>
      <p>Signed in as <strong id="atproto-handle-display"></strong></p>
      <button class="btn-small btn-danger" id="atproto-signout-btn">Sign out</button>
    </div>
  </section>

  <!-- Import -->
  <section id="import-section">
    <button class="btn-primary" id="import-btn">Import This Page</button>
    <div id="status"></div>
  </section>

  <!-- Recipe List -->
  <section id="recipes-section">
    <h2>Imported Recipes</h2>
    <ul class="recipe-list" id="recipe-list"></ul>
  </section>

  <script type="module" src="popup.js"></script>
</body>
</html>
