<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="{{MANIFEST_PATH}}">
<link rel="apple-touch-icon" href="{{ICON_PATH}}">
<title>Recipe</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --card: #2a2a4a;
  --card-raised: #33335a;
  --text: #e0e0e0;
  --text-dim: #8888aa;
  --text-muted: #6a6a8a;
  --accent-orange: #f4a261;
  --accent-teal: #4ecdc4;
  --accent-purple: #7c5cfc;
  --accent-gray: #8a8a9a;
  --danger: #e74c3c;
  --success: #2ecc71;
  --radius: 12px;
  --radius-sm: 8px;
  --touch-min: 48px;
  --transition: 0.2s ease;

  /* Fluid typography */
  --text-xs: clamp(0.7rem, 0.65rem + 0.25vw, 0.8rem);
  --text-sm: clamp(0.8rem, 0.75rem + 0.25vw, 0.9rem);
  --text-base: clamp(0.875rem, 0.825rem + 0.25vw, 1rem);
  --text-lg: clamp(1rem, 0.9rem + 0.5vw, 1.25rem);
  --text-xl: clamp(1.25rem, 1rem + 1.25vw, 1.75rem);
  --text-2xl: clamp(1.5rem, 1.25rem + 1.25vw, 2.25rem);

  /* Fluid spacing */
  --space-xs: clamp(4px, 0.2rem + 0.25vw, 8px);
  --space-sm: clamp(8px, 0.4rem + 0.5vw, 12px);
  --space-md: clamp(12px, 0.6rem + 0.75vw, 20px);
  --space-lg: clamp(16px, 0.8rem + 1vw, 28px);
}

html { font-size: 16px; }
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100dvh;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}

/* === HEADER === */
.recipe-header {
  padding: var(--space-lg) var(--space-md) var(--space-sm);
  text-align: center;
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: var(--text-sm);
  color: var(--text-dim);
  text-decoration: none;
  margin-bottom: 8px;
  transition: color var(--transition);
}
.back-link:hover { color: var(--accent-teal); }
.recipe-header h1 {
  font-size: var(--text-2xl);
  font-weight: 700;
  margin-bottom: 4px;
  color: #fff;
}
.recipe-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 16px;
  justify-content: center;
  font-size: var(--text-sm);
  color: var(--text-dim);
  margin-top: 8px;
}
.recipe-meta-item {
  display: flex;
  align-items: center;
  gap: 4px;
}
.difficulty-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: var(--text-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.difficulty-easy { background: var(--success); color: #111; }
.difficulty-medium { background: var(--accent-orange); color: #111; }
.difficulty-hard { background: var(--danger); color: #fff; }

/* === SERVINGS ADJUSTER === */
.servings-adjuster {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 12px 16px;
}
.servings-adjuster label {
  font-size: 0.85rem;
  color: var(--text-dim);
  font-weight: 500;
}
.servings-btn {
  width: var(--touch-min);
  height: var(--touch-min);
  border-radius: 50%;
  border: 2px solid var(--accent-teal);
  background: transparent;
  color: var(--accent-teal);
  font-size: 1.4rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition), color var(--transition);
  -webkit-user-select: none;
  user-select: none;
}
.servings-btn:active {
  background: var(--accent-teal);
  color: var(--bg);
}
.servings-count {
  font-size: 1.5rem;
  font-weight: 700;
  min-width: 48px;
  text-align: center;
  color: #fff;
}

/* === VIEW TOGGLE (tabs) === */
.view-tabs {
  display: flex;
  margin: 0 16px 16px;
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
}
.view-tab {
  flex: 1;
  padding: 12px 8px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
  min-height: var(--touch-min);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.view-tab.active {
  background: var(--accent-teal);
  color: #111;
}

/* === OVERVIEW VIEW === */
.view { display: none; }
.view.active { display: block; }

/* Mode toggle */
.mode-toggle {
  display: flex;
  margin: 0 16px 16px;
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
}
.mode-btn {
  flex: 1;
  padding: 10px 8px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
  min-height: var(--touch-min);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  z-index: 1;
}
.mode-btn.active {
  background: var(--accent-purple);
  color: #fff;
}

/* Equipment summary */
.equipment-summary {
  margin: 0 16px 16px;
  padding: 12px 16px;
  background: var(--card);
  border-radius: var(--radius);
}
.equipment-summary h3 {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.equipment-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.equipment-chip {
  padding: 4px 12px;
  background: var(--card-raised);
  border-radius: 20px;
  font-size: 0.8rem;
  color: var(--text);
}

/* Phases */
.phase-list {
  padding: 0 16px 100px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.phase-card {
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: transform var(--transition);
}
.phase-card:active { transform: scale(0.98); }
.phase-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-left: 4px solid;
}
.phase-header.prep { border-color: var(--accent-orange); }
.phase-header.cook, .phase-header.build { border-color: var(--accent-teal); }
.phase-header.simmer, .phase-header.passive { border-color: var(--accent-purple); }
.phase-header.finish { border-color: var(--accent-gray); }
.phase-label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 2px 8px;
  border-radius: 4px;
  color: #111;
}
.phase-label.prep { background: var(--accent-orange); }
.phase-label.cook, .phase-label.build { background: var(--accent-teal); }
.phase-label.simmer, .phase-label.passive { background: var(--accent-purple); color: #fff; }
.phase-label.finish { background: var(--accent-gray); }
.phase-time {
  font-size: 0.8rem;
  color: var(--text-dim);
}
.phase-ops {
  padding: 0 16px 12px;
}
.phase-op {
  padding: 8px 0;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.phase-op:first-child { border-top: none; }
.phase-op-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.op-action-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  background: rgba(255,255,255,0.08);
  color: var(--text-dim);
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 2px;
}
.op-text {
  font-size: var(--text-base);
  flex: 1;
}
.op-text .qty { font-weight: 700; color: #fff; }
.op-meta {
  display: flex;
  gap: 8px;
  margin-top: 4px;
  font-size: 0.75rem;
  color: var(--text-dim);
}
.op-meta-tag {
  display: inline-flex;
  align-items: center;
  gap: 3px;
}
.parallel-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.parallel-group .phase-op {
  background: rgba(255,255,255,0.03);
  border-radius: var(--radius-sm);
  padding: 8px;
  border-top: none;
}
.passive-badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  background: var(--accent-purple);
  color: #fff;
  margin-left: 4px;
}

/* === COOKING VIEW === */
.cooking-view { padding-bottom: 120px; }

/* Awareness bar */
.awareness-bar {
  padding: 8px 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  min-height: 0;
}
.awareness-bar:empty { display: none; }
.awareness-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--accent-purple);
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 500;
  color: #fff;
  cursor: pointer;
  transition: transform var(--transition);
  animation: pillPulse 2s ease-in-out infinite;
}
@keyframes pillPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.8; }
}
.awareness-pill.done {
  background: var(--success);
  animation: none;
}

/* Focus card */
.focus-card {
  margin: var(--space-sm) var(--space-md);
  background: var(--card);
  border-radius: var(--radius);
  padding: var(--space-lg);
  position: relative;
}
.step-counter {
  font-size: var(--text-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent-teal);
  margin-bottom: 8px;
}
.sub-product-label {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 4px;
  font-size: var(--text-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: rgba(244, 162, 97, 0.15);
  color: var(--accent-orange);
  margin-bottom: 8px;
}
.focus-action {
  font-size: var(--text-xl);
  font-weight: 700;
  color: #fff;
  margin-bottom: 12px;
  text-transform: capitalize;
}
.focus-details {
  font-size: var(--text-base);
  line-height: 1.6;
  color: var(--text);
  margin-bottom: 16px;
}
.focus-details .qty { font-weight: 700; color: #fff; }
.focus-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.focus-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 12px;
  background: var(--card-raised);
  border-radius: 20px;
  font-size: 0.8rem;
  color: var(--text-dim);
}
.focus-tag .icon { font-size: 0.9rem; }
.focus-tag.occupied {
  background: rgba(124, 92, 252, 0.2);
  color: var(--accent-purple);
  border: 1px solid rgba(124, 92, 252, 0.3);
}
.focus-tag.released {
  background: rgba(46, 204, 113, 0.15);
  color: var(--success);
}
.timer-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  background: var(--accent-orange);
  color: #111;
  border: none;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: transform var(--transition), opacity var(--transition);
  min-height: var(--touch-min);
}
.timer-btn:active { transform: scale(0.95); }
.timer-btn.running {
  background: var(--accent-purple);
  color: #fff;
}

/* Context banner (passive op like simmer running in background) */
.context-banner {
  margin: 0 var(--space-md) var(--space-sm);
  padding: 12px 16px;
  background: var(--accent-purple);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.context-banner-text {
  font-size: var(--text-sm);
  font-weight: 600;
  color: #fff;
}
.context-banner-sub {
  font-size: var(--text-xs);
  color: rgba(255,255,255,0.7);
}
.context-timer-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 14px;
  background: rgba(255,255,255,0.2);
  color: #fff;
  border: none;
  border-radius: 20px;
  font-size: var(--text-xs);
  font-weight: 600;
  cursor: pointer;
  min-height: 36px;
  transition: background var(--transition);
}
.context-timer-btn:active { background: rgba(255,255,255,0.3); }
.context-timer-btn.running { background: rgba(255,255,255,0.35); }

/* Secondary parallel task */
.secondary-task {
  margin: 0 16px 12px;
  padding: 14px 16px;
  background: var(--card);
  border-radius: var(--radius);
  border: 1px dashed rgba(255,255,255,0.15);
  cursor: pointer;
  transition: transform var(--transition);
}
.secondary-task:active { transform: scale(0.98); }
.secondary-task-label {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent-teal);
  margin-bottom: 4px;
}
.secondary-task-summary {
  font-size: 0.95rem;
  color: var(--text);
}
.secondary-task-hint {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Next-up preview */
.next-preview {
  margin: 0 16px 12px;
  padding: 14px 16px;
  background: var(--card);
  border-radius: var(--radius);
  opacity: 0.5;
  transition: opacity var(--transition);
}
.next-preview-label {
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.next-preview-text {
  font-size: 0.9rem;
  color: var(--text-dim);
}

/* Navigation buttons */
.nav-buttons {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  gap: 1px;
  background: var(--bg);
  padding: 8px 16px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  z-index: 100;
}
.nav-btn {
  flex: 1;
  min-height: var(--touch-min);
  padding: 12px 16px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background var(--transition), transform var(--transition);
}
.nav-btn:active { transform: scale(0.97); }
.nav-btn-back {
  background: var(--card);
  color: var(--text);
}
.nav-btn-next {
  background: var(--accent-teal);
  color: #111;
}
.nav-btn:disabled {
  opacity: 0.3;
  cursor: default;
}

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--card-raised); border-radius: 2px; }

/* === ANIMATIONS === */
.fade-in { animation: fadeIn 0.2s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* === WAKE LOCK INDICATOR === */
.wake-lock-indicator {
  position: fixed;
  top: 8px;
  right: 12px;
  font-size: 0.7rem;
  color: var(--text-muted);
  opacity: 0.6;
  z-index: 50;
  pointer-events: none;
}

/* === SCREEN-READER ONLY === */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* === RESPONSIVE === */

/* Tablet */
@media (min-width: 600px) {
  .phase-list, .focus-card, .secondary-task, .next-preview, .awareness-bar, .context-banner,
  .equipment-summary, .mode-toggle, .view-tabs, .servings-adjuster {
    max-width: 640px;
    margin-left: auto;
    margin-right: auto;
  }
  .nav-buttons { max-width: 640px; left: 50%; transform: translateX(-50%); }
  .recipe-header { padding: 28px 24px 16px; }
  .parallel-group { gap: 12px; }
}

/* Desktop */
@media (min-width: 1024px) {
  .phase-list, .focus-card, .secondary-task, .next-preview, .awareness-bar, .context-banner,
  .equipment-summary, .mode-toggle, .view-tabs, .servings-adjuster {
    max-width: 860px;
  }
  .nav-buttons { max-width: 860px; }
  .phase-ops { columns: 2; column-gap: 16px; }
  .phase-op { break-inside: avoid; }
}
</style>
</head>

<!-- Header -->
<header class="recipe-header" id="recipeHeader"></header>

<!-- Servings adjuster -->
<div class="servings-adjuster" id="servingsAdjuster"></div>

<!-- View tabs -->
<div class="view-tabs" id="viewTabs" role="tablist" aria-label="View"></div>

<!-- Overview View -->
<section class="view active" id="overviewView" role="tabpanel" aria-labelledby="tab-overview">
  <div class="mode-toggle" id="modeToggle"></div>
  <div class="equipment-summary" id="equipmentSummary"></div>
  <div class="phase-list" id="phaseList"></div>
</section>

<!-- Cooking View -->
<div class="wake-lock-indicator" id="wakeLockIndicator" style="display:none" aria-hidden="true"></div>

<section class="view cooking-view" id="cookingView" role="tabpanel" aria-labelledby="tab-cooking">
  <div class="awareness-bar" id="awarenessBar" role="status" aria-live="polite"></div>
  <div id="focusArea" aria-live="polite" aria-atomic="false"></div>
  <div class="nav-buttons" id="navButtons"></div>
</section>

<script type="module">
import { setup, createActor, assign, fromCallback, enqueueActions } from 'xstate';

/* NOTE: All data is injected at build time from trusted recipe JSON sources.
   The esc() function provides HTML entity encoding for all rendered text. */
const RECIPE = {{RECIPE_JSON}};
const I18N = {{I18N_JSON}};
const SCHEDULE_RELAXED = {{SCHEDULE_RELAXED_JSON}};
const SCHEDULE_OPTIMIZED = {{SCHEDULE_OPTIMIZED_JSON}};

/* ===================================================================
   HELPERS
   =================================================================== */
function $(sel) { return document.querySelector(sel); }

function getSchedule(mode) {
  return mode === 'relaxed' ? SCHEDULE_RELAXED : SCHEDULE_OPTIMIZED;
}

function scaleQuantity(qty, unit, scaleFactor) {
  if (qty == null) return null;
  var scaled = qty * scaleFactor;
  var wholeUnits = ['whole', 'cloves', 'clove', 'pieces', 'piece', 'slices',
    'slice', 'leaves', 'leaf', 'sprigs', 'sprig', 'stalks', 'stalk',
    'heads', 'head', 'bunches', 'bunch', 'ears', 'ear'];
  if (wholeUnits.indexOf((unit || '').toLowerCase()) !== -1) {
    return Math.max(1, Math.round(scaled));
  }
  var u = (unit || '').toLowerCase();
  if (u === 'g' || u === 'ml') {
    if (scaled > 50) return Math.round(scaled / 5) * 5;
    return Math.round(scaled);
  }
  var r = Math.round(scaled * 10) / 10;
  return r === Math.floor(r) ? Math.floor(r) : r;
}

function scaleTime(op, scaleFactor) {
  if (op.scalable === false) return op.time;
  if (scaleFactor <= 1) return Math.max(1, Math.round(op.time * scaleFactor));
  return Math.round(op.time * Math.sqrt(scaleFactor));
}

function getIngredient(id) {
  return RECIPE.ingredients.find(function(i) { return i.id === id; });
}

function getOperation(id) {
  return RECIPE.operations.find(function(o) { return o.id === id; });
}

function formatIngredientInline(ingId, scaleFactor) {
  var ing = getIngredient(ingId);
  if (!ing) return '';
  var qty = scaleQuantity(ing.quantity, ing.unit, scaleFactor);
  var unitStr = (ing.unit && ing.unit !== 'whole') ? ' ' + esc(ing.unit) : '';
  var qtyStr = qty != null ? '<span class="qty">' + qty + unitStr + '</span> ' : '';
  return qtyStr + esc(ing.name);
}

function getOpIngredients(op) {
  if (!op.inputs) return [];
  return op.inputs.filter(function(id) { return !!getIngredient(id); });
}

function buildOpDescription(op, scaleFactor) {
  var parts = [];
  var ings = getOpIngredients(op);
  if (ings.length > 0) {
    parts.push(ings.map(function(id) { return formatIngredientInline(id, scaleFactor); }).join(', '));
  }
  if (op.details) {
    parts.push(esc(op.details));
  }
  return parts.join(' &mdash; ');
}

function phaseColorClass(type) {
  var t = (type || '').toLowerCase();
  if (t === 'prep') return 'prep';
  if (t === 'cook' || t === 'build') return 'cook';
  if (t === 'simmer' || t === 'passive') return 'simmer';
  if (t === 'finish') return 'finish';
  return 'cook';
}

function phaseLabel(type) {
  var t = (type || '').toLowerCase();
  return I18N.phases[t] || type || '';
}

function formatMinutes(min) {

function esc(str) {

}

function capitalize(str) {
  if (!str) return '';

}

function playTimerAlarm() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var beeps = [
      { freq: 880, start: 0, dur: 0.15 },
      { freq: 880, start: 0.25, dur: 0.15 },
      { freq: 880, start: 0.5, dur: 0.15 },
      { freq: 1100, start: 0.85, dur: 0.3 },
    ];
    beeps.forEach(function(b) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = b.freq;
      gain.gain.setValueAtTime(0.3, ctx.currentTime + b.start);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + b.start + b.dur);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + b.start);
      osc.stop(ctx.currentTime + b.start + b.dur + 0.05);
    });
    setTimeout(function() { ctx.close(); }, 2000);
  } catch (e) { /* Web Audio not available */ }
}

   WAKE LOCK: keep screen on during cooking mode
   =================================================================== */
var wakeLockSentinel = null;

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLockSentinel = await navigator.wakeLock.request('screen');
    wakeLockSentinel.addEventListener('release', function() {
      wakeLockSentinel = null;
      var ind = $('#wakeLockIndicator');
      if (ind) ind.style.display = 'none';
    });
    var ind = $('#wakeLockIndicator');
    if (ind) { ind.textContent = I18N.labels.screenOn; ind.style.display = 'block'; }
  } catch (e) { /* Wake lock request failed — low battery, background tab, etc. */ }
}

function releaseWakeLock() {
  if (wakeLockSentinel) {
    wakeLockSentinel.release();
    wakeLockSentinel = null;
  }
  var ind = $('#wakeLockIndicator');
  if (ind) ind.style.display = 'none';
}

/* ===================================================================
   SUB-PRODUCT MAP: operation ID → sub-product name
   =================================================================== */
var OP_SUB_PRODUCT = (function() {
  var map = {};
  if (!RECIPE.subProducts) return map;

  // Sort sub-products: leaf products first (those whose finalOp is NOT
  // an input to another sub-product's chain). This ensures "Meat Sauce"
  // and "Béchamel" claim their ops before "Baked Lasagne" walks through them.
  var spFinalOps = {};
  RECIPE.subProducts.forEach(function(sp) { spFinalOps[sp.finalOp] = sp.id; });

  // A sub-product is a "leaf" if no other sub-product's finalOp depends on it
  // (transitively via operations). Simple heuristic: sort by chain depth (shorter first).
  function chainDepth(opId, visited) {
    if (!visited) visited = {};
    if (visited[opId]) return 0;
    visited[opId] = true;
    var op = getOperation(opId);
    if (!op) return 0;
    var maxD = 0;
    (op.inputs || []).forEach(function(ref) {
      if (getOperation(ref)) maxD = Math.max(maxD, chainDepth(ref, visited));
    });
    return maxD + 1;
  }

  var sorted = RECIPE.subProducts.slice().sort(function(a, b) {
    return chainDepth(a.finalOp) - chainDepth(b.finalOp);
  });

  sorted.forEach(function(sp) {
    var visited = {};
    function walkBack(opId) {
      if (visited[opId]) return;
      visited[opId] = true;
      if (map[opId]) return; // already claimed by a more specific sub-product
      map[opId] = sp.name;
      var op = getOperation(opId);
      if (!op) return;
      (op.inputs || []).forEach(function(ref) {
        if (getOperation(ref)) walkBack(ref);
      });
    }
    walkBack(sp.finalOp);
  });

  // Label ops that feed into finishSteps but aren't claimed by any sub-product
  if (RECIPE.finishSteps) {
    RECIPE.finishSteps.forEach(function(fs) {
      var label = capitalize(fs.action || '');
      (fs.inputs || []).forEach(function(ref) {
        var visited = {};
        function walkBack(opId) {
          if (visited[opId]) return;
          visited[opId] = true;
          if (map[opId]) return;
          map[opId] = label;
          var op = getOperation(opId);
          if (!op) return;
          (op.inputs || []).forEach(function(r) {
            if (getOperation(r)) walkBack(r);
          });
        }
        if (getOperation(ref)) walkBack(ref);
      });
    });
  }

  return map;
})();

/* ===================================================================
   TOPO SORT (for parallel ops with dependencies)
   =================================================================== */
function topoSortOps(ops) {
  if (ops.length <= 1) return ops.slice();
  var opIds = {};
  ops.forEach(function(op) { opIds[op.id] = true; });
  var inDeg = {};
  var adj = {};
  ops.forEach(function(op) { inDeg[op.id] = 0; adj[op.id] = []; });
  ops.forEach(function(op) {
    (op.inputs || []).forEach(function(ref) {
      if (opIds[ref]) {
        adj[ref].push(op.id);
        inDeg[op.id]++;
      }
    });
  });
  var queue = [];
  ops.forEach(function(op) { if (inDeg[op.id] === 0) queue.push(op.id); });
  var sorted = [];
  var opMap = {};
  ops.forEach(function(op) { opMap[op.id] = op; });
  while (queue.length) {
    var n = queue.shift();
    sorted.push(opMap[n]);
    adj[n].forEach(function(nb) {
      inDeg[nb]--;
      if (inDeg[nb] === 0) queue.push(nb);
    });
  }
  return sorted;
}

/* ===================================================================
   COOKING STEPS BUILDER
   =================================================================== */
function buildCookingSteps(mode) {
  var schedule = getSchedule(mode);
  var phases = Array.isArray(schedule) ? schedule : (schedule ? schedule.phases : null);
  if (!phases || !phases.length) return [];

  var steps = [];
  phases.forEach(function(phase, phaseIdx) {
    // Resolve main ops
    var mainOps = [];
    if ((phase.ops || phase.operations)) {
      (phase.ops || phase.operations).forEach(function(ref) {
        var id = typeof ref === 'string' ? ref : (ref.opId || ref.id);
        var op = getOperation(id);
        if (op) mainOps.push(op);
        else if (typeof ref === 'object' && ref.action) mainOps.push(ref);
      });
    }

    // Resolve parallel ops
    var parallelOps = [];
    if (phase.parallelOps && phase.parallelOps.length > 0) {
      parallelOps = phase.parallelOps.map(function(ref) {
        var id = typeof ref === 'string' ? ref : (ref.opId || ref.id);
        return getOperation(id) || ref;
      }).filter(Boolean);
    }

    // Check if main op is passive (idle window creator like simmer)
    var mainIsPassive = mainOps.length === 1 && mainOps[0].activeTime != null
      && mainOps[0].time > 0 && mainOps[0].activeTime < mainOps[0].time * 0.25;

    if (mainIsPassive && parallelOps.length > 0) {
      // Separate chain ops (have dependencies on other parallelOps) from independent ones
      var chainOps = [];
      var indepOps = [];
      var parallelIds = {};
      parallelOps.forEach(function(op) { parallelIds[op.id] = true; });

      parallelOps.forEach(function(op) {
        var isInChain = false;
        // Check if this op depends on another parallel op, or another parallel op depends on it
        for (var j = 0; j < parallelOps.length; j++) {
          if (parallelOps[j].id === op.id) continue;
          if ((parallelOps[j].inputs || []).indexOf(op.id) !== -1 ||
              (op.inputs || []).some(function(ref) { return !!parallelIds[ref]; })) {
            isInChain = true;
            break;
          }
        }
        if (isInChain) chainOps.push(op);
        else indepOps.push(op);
      });

      // Topological sort chain ops
      var sortedChain = topoSortOps(chainOps);

      // Emit chain ops as sequential single steps with context
      sortedChain.forEach(function(op) {
        steps.push({
          type: 'single',
          phaseType: phase.type,
          phaseIdx: phaseIdx,
          op: op,
          context: mainOps[0],
        });
      });

      // Group independent ops as parallel (or single)
      if (indepOps.length >= 2) {
        var sorted = indepOps.slice().sort(function(a, b) { return (b.time || 0) - (a.time || 0); });
        steps.push({
          type: 'parallel',
          phaseType: phase.type,
          phaseIdx: phaseIdx,
          primary: sorted[0],
          secondary: sorted.slice(1),
          context: mainOps[0],
        });
      } else if (indepOps.length === 1) {
        steps.push({
          type: 'single',
          phaseType: phase.type,
          phaseIdx: phaseIdx,
          op: indepOps[0],
          context: mainOps[0],
        });
      }
    } else {
      // Emit main ops as individual steps
      mainOps.forEach(function(op) {
        steps.push({ type: 'single', phaseType: phase.type, phaseIdx: phaseIdx, op: op });
      });

      // Then any parallel ops
      if (parallelOps.length >= 2) {
        var sorted = parallelOps.slice().sort(function(a, b) { return (b.time || 0) - (a.time || 0); });
        steps.push({
          type: 'parallel',
          phaseType: phase.type,
          phaseIdx: phaseIdx,
          primary: sorted[0],
          secondary: sorted.slice(1),
        });
      } else if (parallelOps.length === 1) {
        steps.push({ type: 'single', phaseType: phase.type, phaseIdx: phaseIdx, op: parallelOps[0] });
      }
    }
  });

  return steps;
}

/* ===================================================================
   XSTATE: TIMER ACTOR
   =================================================================== */
const timerActor = fromCallback(({ input, sendBack }) => {
  const { opId, totalSeconds } = input;
  let remaining = totalSeconds;
  const interval = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      clearInterval(interval);
      sendBack({ type: 'TIMER.DONE', opId });
    } else {
      sendBack({ type: 'TIMER.TICK', opId, remaining });
    }
  }, 1000);
  return () => clearInterval(interval);
});

/* ===================================================================
   XSTATE: RECIPE MACHINE
   =================================================================== */
const recipeMachine = setup({
  types: {},
  actors: {
    timerActor,
  },
  actions: {
    adjustServings: assign({
      servings: ({ context, event }) => {
        const next = context.servings + event.delta;
        return Math.max(1, Math.min(99, next));
      },
    }),
    setMode: assign({
      mode: ({ event }) => event.mode,
      currentStep: 0,
      cookingSteps: ({ event }) => buildCookingSteps(event.mode),
    }),
    buildSteps: assign({
      cookingSteps: ({ context }) => buildCookingSteps(context.mode),
      currentStep: 0,
    }),
    jumpToPhase: assign(({ context, event }) => {
      const steps = buildCookingSteps(context.mode);
      const idx = steps.findIndex(function(s) { return s.phaseIdx === event.phaseIdx; });
      return {
        cookingSteps: steps,
        currentStep: idx >= 0 ? idx : 0,
      };
    }),
    nextStep: assign({
      currentStep: ({ context }) => Math.min(context.currentStep + 1, context.cookingSteps.length - 1),
    }),
    prevStep: assign({
      currentStep: ({ context }) => Math.max(context.currentStep - 1, 0),
    }),
    swapPrimarySecondary: assign({
      cookingSteps: ({ context }) => {
        const steps = [...context.cookingSteps];
        const step = steps[context.currentStep];
        if (step && step.type === 'parallel') {
          const newStep = { ...step };
          const old = newStep.primary;
          newStep.primary = newStep.secondary[0];
          const newSecondary = [...newStep.secondary];
          newSecondary[0] = old;
          newStep.secondary = newSecondary;
          steps[context.currentStep] = newStep;
        }
        return steps;
      },
    }),
    spawnTimer: assign(({ context, event, spawn }) => {
      const { opId, minutes, seconds } = event;
      if (context.timers[opId]) return {};
      const totalSeconds = seconds || (minutes * 60);
      const ref = spawn('timerActor', {
        id: `timer-${opId}`,
        input: { opId, totalSeconds },
      });
      return {
        timers: { ...context.timers, [opId]: ref },
        timerStates: {
          ...context.timerStates,
          [opId]: { remaining: totalSeconds, total: totalSeconds, done: false },
        },
      };
    }),
    cancelTimer: enqueueActions(({ context, event, enqueue }) => {
      const { opId } = event;
      const ref = context.timers[opId];
      if (ref) {
        enqueue.stopChild(`timer-${opId}`);
      }
      const newTimers = { ...context.timers };
      delete newTimers[opId];
      const newTimerStates = { ...context.timerStates };
      delete newTimerStates[opId];
      enqueue.assign({
        timers: newTimers,
        timerStates: newTimerStates,
      });
    }),
    updateTimerTick: assign({
      timerStates: ({ context, event }) => ({
        ...context.timerStates,
        [event.opId]: {
          ...context.timerStates[event.opId],
          remaining: event.remaining,
        },
      }),
    }),
    handleTimerDone: assign({
      timerStates: ({ context, event }) => ({
        ...context.timerStates,
        [event.opId]: {
          ...context.timerStates[event.opId],
          remaining: 0,
          done: true,
        },
      }),
    }),
    fireNotification: ({ event }) => {
      playTimerAlarm();
      if ('Notification' in window && Notification.permission === 'granted') {
        const op = getOperation(event.opId);
        const title = op ? capitalize(op.action) : I18N.labels.timerDone;
        try {
          new Notification(I18N.labels.timerDone, {
            body: title + ' \u2014 ' + RECIPE.meta.title,
          });
        } catch (e) { /* notification blocked */ }
      }
    },
    requestNotificationPermission: ({ self }) => {
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission().then(function(p) {
          self.send({ type: 'SET_NOTIFICATION_PERMISSION', granted: p === 'granted' });
        });
      } else if ('Notification' in window) {
        self.send({ type: 'SET_NOTIFICATION_PERMISSION', granted: Notification.permission === 'granted' });
      }
    },
    setNotificationPermission: assign({
      notificationPermission: ({ event }) => event.granted,
    }),
  },
}).createMachine({
  id: 'recipe',
  type: 'parallel',
  context: {
    servings: RECIPE.meta.servings,
    originalServings: RECIPE.meta.servings,
    mode: 'relaxed',
    currentStep: 0,
    cookingSteps: [],
    timers: {},
    timerStates: {},
    notificationPermission: false,
  },
  states: {
    view: {
      initial: 'overview',
      states: {
        overview: {
          on: {
            SWITCH_VIEW: [
              { guard: ({ event }) => event.view === 'cooking', target: 'cooking', actions: ['buildSteps'] },
            ],
            JUMP_TO_PHASE: {
              target: 'cooking',
              actions: ['jumpToPhase'],
            },
            SET_MODE: {
              actions: ['setMode'],
            },
          },
        },
        cooking: {
          on: {
            SWITCH_VIEW: [
              { guard: ({ event }) => event.view === 'overview', target: 'overview' },
            ],
            NEXT_STEP: {
              actions: ['nextStep'],
            },
            PREV_STEP: {
              actions: ['prevStep'],
            },
            SWAP_PRIMARY_SECONDARY: {
              actions: ['swapPrimarySecondary'],
            },
            SET_MODE: {
              actions: ['setMode'],
            },
          },
        },
      },
    },
    timing: {
      on: {
        START_TIMER: {
          actions: ['requestNotificationPermission', 'spawnTimer'],
        },
        CANCEL_TIMER: {
          actions: ['cancelTimer'],
        },
        'TIMER.TICK': {
          actions: ['updateTimerTick'],
        },
        'TIMER.DONE': {
          actions: ['handleTimerDone', 'fireNotification'],
        },
      },
    },
    servings: {
      on: {
        ADJUST_SERVINGS: {
          actions: ['adjustServings'],
        },
        SET_NOTIFICATION_PERMISSION: {
          actions: ['setNotificationPermission'],
        },
      },
    },
  },
});

  phases.forEach(function(phase, phaseIdx) {

    var card = document.createElement('div');

    card.appendChild(header);

    // Operations
    var opsDiv = document.createElement('div');
    opsDiv.className = 'phase-ops';

    if (phase.parallelOps && phase.parallelOps.length > 0) {
      var parallelDiv = document.createElement('div');
      parallelDiv.className = 'parallel-group';
      phase.parallelOps.forEach(function(opRef) {
        appendPhaseOp(parallelDiv, opRef, scaleFactor);
      });
      opsDiv.appendChild(parallelDiv);
    }

    if ((phase.ops || phase.operations)) {
      (phase.ops || phase.operations).forEach(function(opRef) {
        appendPhaseOp(opsDiv, opRef, scaleFactor);
      });
    }

    card.appendChild(opsDiv);
    container.appendChild(card);
  });
}

function appendPhaseOp(parent, opRef, scaleFactor) {
  var opId = typeof opRef === 'string' ? opRef : (opRef.opId || opRef.id);
  var op = getOperation(opId);

  if (!op) {
    // Check finishSteps (only if we have a valid opId)
    if (opId && RECIPE.finishSteps) {
      var fs = RECIPE.finishSteps.find(function(f) { return f.action === opId; });
      if (fs) { appendFinishStepOp(parent, fs); return; }
    }
    if (typeof opRef === 'object' && opRef.action) { appendInlineOp(parent, opRef); return; }
    return;
  }

  var isPassive = op.activeTime === 0;
  var desc = buildOpDescription(op, scaleFactor);

  var div = document.createElement('div');
  div.className = 'phase-op';

  var row = document.createElement('div');
  row.className = 'phase-op-row';

  var tag = document.createElement('span');
  tag.className = 'op-action-tag';
  tag.textContent = op.action;
  row.appendChild(tag);

  var text = document.createElement('span');
  text.className = 'op-text';
  /* desc contains pre-escaped ingredient HTML with <span class="qty"> for bold quantities */
  text.innerHTML = desc;
  if (isPassive) {
    var badge = document.createElement('span');
    badge.className = 'passive-badge';
    badge.textContent = I18N.labels.passive;
    text.appendChild(badge);
  }
  row.appendChild(text);
  div.appendChild(row);

  if (op.time || op.heat) {
    var meta = document.createElement('div');
    meta.className = 'op-meta';
    if (op.time) {
      var tTag = document.createElement('span');
      tTag.className = 'op-meta-tag';
      tTag.textContent = '\u23F2 ' + formatMinutes(scaleTime(op, scaleFactor));
      meta.appendChild(tTag);
    }
    if (op.heat) {
      var hTag = document.createElement('span');
      hTag.className = 'op-meta-tag';
      hTag.textContent = '\uD83D\uDD25 ' + op.heat;
      meta.appendChild(hTag);
    }
    div.appendChild(meta);
  }

  parent.appendChild(div);
}

function appendFinishStepOp(parent, fs) {
  var div = document.createElement('div');
  div.className = 'phase-op';
  var row = document.createElement('div');
  row.className = 'phase-op-row';
  var tag = document.createElement('span');
  tag.className = 'op-action-tag';
  tag.textContent = fs.action;
  row.appendChild(tag);
  var text = document.createElement('span');
  text.className = 'op-text';
  text.textContent = fs.details || '';
  row.appendChild(text);
  div.appendChild(row);
  parent.appendChild(div);
}

function appendInlineOp(parent, opRef) {
  var div = document.createElement('div');
  div.className = 'phase-op';
  var row = document.createElement('div');
  row.className = 'phase-op-row';
  var tag = document.createElement('span');
  tag.className = 'op-action-tag';
  tag.textContent = opRef.action || '';
  row.appendChild(tag);
  var text = document.createElement('span');
  text.className = 'op-text';
  text.textContent = opRef.details || opRef.description || '';
  row.appendChild(text);
  div.appendChild(row);
  parent.appendChild(div);
}

/* ===================================================================
   RENDER: COOKING VIEW (Focus Area)
   =================================================================== */
function renderFocusArea(ctx) {
  var scaleFactor = ctx.servings / ctx.originalServings;
  var totalSteps = ctx.cookingSteps.length;
  var focusArea = $('#focusArea');
  focusArea.textContent = '';

  if (totalSteps === 0) {
    var p = document.createElement('p');
    p.style.cssText = 'text-align:center;color:var(--text-dim);padding:40px';
    p.textContent = 'No steps available';
    focusArea.appendChild(p);
    return;
  }

  var step = ctx.cookingSteps[ctx.currentStep];

  // Context banner: passive op running in background (e.g. simmer)
  if (step.context) {
    focusArea.appendChild(buildContextBanner(step.context, ctx, scaleFactor));
  }

  if (step.type === 'parallel') {
    focusArea.appendChild(buildFocusCard(step.primary, ctx.currentStep, totalSteps, ctx, scaleFactor));
    step.secondary.forEach(function(sec) {
      focusArea.appendChild(buildSecondaryTask(sec, scaleFactor));
    });
  } else {
    focusArea.appendChild(buildFocusCard(step.op, ctx.currentStep, totalSteps, ctx, scaleFactor));
  }

  // Next-up preview
  if (ctx.currentStep < totalSteps - 1) {
    var nextStep = ctx.cookingSteps[ctx.currentStep + 1];
    var nextOp = nextStep.type === 'parallel' ? nextStep.primary : nextStep.op;
    var nextLabel = (step.type === 'parallel') ? I18N.labels.afterBothComplete : I18N.labels.next;

    var preview = document.createElement('div');
    preview.className = 'next-preview fade-in';

    var previewLabel = document.createElement('div');
    previewLabel.className = 'next-preview-label';
    previewLabel.textContent = nextLabel.toUpperCase();
    preview.appendChild(previewLabel);

    var previewText = document.createElement('div');
    previewText.className = 'next-preview-text';
    previewText.textContent = capitalize(nextOp.action || '') + (nextOp.details ? ' \u2014 ' + nextOp.details : '');
    preview.appendChild(previewText);

    focusArea.appendChild(preview);
  }
}

function buildFocusCard(op, stepIdx, totalSteps, ctx, scaleFactor) {
  var desc = op.id ? buildOpDescription(op, scaleFactor) : esc(op.details || '');
  var time = op.time ? scaleTime(op, scaleFactor) : null;
  // Show timer only for steps with passive waiting time (activeTime < time),
  // or steps without activeTime (e.g. finish steps like "rest")
  var hasTimer = time && time > 0 && (op.activeTime == null || op.activeTime < op.time);

  var card = document.createElement('div');
  card.className = 'focus-card fade-in';

  var counter = document.createElement('div');
  counter.className = 'step-counter';
  counter.textContent = I18N.labels.step + ' ' + (stepIdx + 1) + ' ' + I18N.labels.of + ' ' + totalSteps;
  card.appendChild(counter);

  // Show which sub-product this step contributes to
  var spName = op.id ? OP_SUB_PRODUCT[op.id] : null;
  if (spName) {
    var spLabel = document.createElement('div');
    spLabel.className = 'sub-product-label';
    spLabel.textContent = spName;
    card.appendChild(spLabel);
  }

  var action = document.createElement('h2');
  action.className = 'focus-action';
  action.textContent = capitalize(op.action || '');
  card.appendChild(action);

  var details = document.createElement('div');
  details.className = 'focus-details';
  /* desc contains pre-escaped text with <span class="qty"> for bold ingredient quantities */
  details.innerHTML = desc;
  card.appendChild(details);

  var tags = document.createElement('div');
  tags.className = 'focus-tags';

  if (time) {
    var timeTag = document.createElement('span');
    timeTag.className = 'focus-tag';
    timeTag.textContent = '\u23F2 ' + formatMinutes(time);
    tags.appendChild(timeTag);
  }
  if (op.heat) {
    var heatTag = document.createElement('span');
    heatTag.className = 'focus-tag';
    heatTag.textContent = '\uD83D\uDD25 ' + op.heat;
    tags.appendChild(heatTag);
  }
  if (op.equipment) {
    var eqName = typeof op.equipment === 'string' ? op.equipment : (op.equipment.use || '');
    if (eqName) {
      var eq = RECIPE.equipment && RECIPE.equipment.find(function(e) { return e.id === eqName; });
      var eqRelease = typeof op.equipment === 'object' ? op.equipment.release : true;
      var eqTag = document.createElement('span');
      eqTag.className = 'focus-tag' + (eqRelease ? ' released' : ' occupied');
      eqTag.textContent = '\uD83C\uDF73 ' + (eq ? eq.name : eqName) + (eqRelease ? '' : ' \u2192');
      tags.appendChild(eqTag);
    }
  }
  card.appendChild(tags);

  if (hasTimer) {
    var timerDiv = document.createElement('div');
    timerDiv.style.marginTop = '12px';

    var opId = op.id || op.action || ('step-' + stepIdx);
    var timerState = ctx.timerStates[opId];

    var btn = document.createElement('button');
    btn.dataset.opId = opId;
    if (timerState && !timerState.done) {
      btn.className = 'timer-btn running';
      btn.textContent = '\u23F2 ' + formatTimerDisplay(timerState.remaining) + ' \u2014 tap to cancel';
      btn.setAttribute('aria-label', formatTimerDisplay(timerState.remaining) + ' ' + I18N.labels.remaining + ', ' + I18N.labels.tapToCancel);
      btn.addEventListener('click', function() { actor.send({ type: 'CANCEL_TIMER', opId: opId }); });
    } else {
      btn.className = 'timer-btn';
      btn.textContent = '\u23F2 Start ' + formatMinutes(time) + ' timer';
      btn.setAttribute('aria-label', I18N.labels.startTimer + ' ' + formatMinutes(time));
      btn.addEventListener('click', function() { actor.send({ type: 'START_TIMER', opId: opId, minutes: time }); });
    }
    timerDiv.appendChild(btn);
    card.appendChild(timerDiv);
  }

  return card;
}

function buildSecondaryTask(op, scaleFactor) {
  var desc = op.id ? buildOpDescription(op, scaleFactor) : esc(op.details || '');

  var container = document.createElement('div');
  container.className = 'secondary-task fade-in';
  container.addEventListener('click', function() { actor.send({ type: 'SWAP_PRIMARY_SECONDARY' }); });

  var label = document.createElement('div');
  label.className = 'secondary-task-label';
  var secSpName = op.id ? OP_SUB_PRODUCT[op.id] : null;
  label.textContent = I18N.labels.whileWaiting + (secSpName ? ' \u2014 ' + secSpName : '');
  container.appendChild(label);

  var summary = document.createElement('div');
  summary.className = 'secondary-task-summary';
  var strong = document.createElement('strong');
  strong.textContent = capitalize(op.action || '');
  summary.appendChild(strong);
  /* desc contains pre-escaped text with <span class="qty"> for bold ingredient quantities */
  var descSpan = document.createElement('span');
  descSpan.innerHTML = ' \u2014 ' + desc;
  summary.appendChild(descSpan);
  container.appendChild(summary);

  var hint = document.createElement('div');
  hint.className = 'secondary-task-hint';
  hint.textContent = I18N.labels.tapToExpand;
  container.appendChild(hint);

  return container;
}

function buildContextBanner(op, ctx, scaleFactor) {
  var time = op.time ? scaleTime(op, scaleFactor) : null;
  var opId = op.id || 'context';
  var timerState = ctx.timerStates[opId];

  var banner = document.createElement('div');
  banner.className = 'context-banner fade-in';

  var textDiv = document.createElement('div');
  var main = document.createElement('div');
  main.className = 'context-banner-text';
  var ctxSpName = op.id ? OP_SUB_PRODUCT[op.id] : null;
  main.textContent = (ctxSpName ? ctxSpName + ': ' : '') + capitalize(op.action || '') + (time ? ' \u2014 ' + formatMinutes(time) : '');
  textDiv.appendChild(main);

  if (op.details) {
    var sub = document.createElement('div');
    sub.className = 'context-banner-sub';
    sub.textContent = op.details;
    textDiv.appendChild(sub);
  }
  banner.appendChild(textDiv);

  if (time && time > 0) {
    var btn = document.createElement('button');
    btn.dataset.opId = opId;
    if (timerState && !timerState.done) {
      btn.className = 'context-timer-btn running';
      btn.textContent = '\u23F2 ' + formatTimerDisplay(timerState.remaining);
      btn.setAttribute('aria-label', formatTimerDisplay(timerState.remaining) + ' ' + I18N.labels.remaining + ', ' + I18N.labels.tapToCancel);
      btn.addEventListener('click', function() { actor.send({ type: 'CANCEL_TIMER', opId: opId }); });
    } else if (timerState && timerState.done) {
      btn.className = 'context-timer-btn';
      btn.textContent = '\u2705 ' + (I18N.labels.timerDone || 'Done');
      btn.setAttribute('aria-label', I18N.labels.timerDone);
    } else {
      btn.className = 'context-timer-btn';
      btn.textContent = '\u23F2 ' + (I18N.labels.startTimer || 'Start timer');
      btn.setAttribute('aria-label', I18N.labels.startTimer + ' ' + formatMinutes(time));
      btn.addEventListener('click', function() { actor.send({ type: 'START_TIMER', opId: opId, minutes: time }); });
    }
    banner.appendChild(btn);
  }

  return banner;
}

function renderNavButtons(ctx) {
  var nav = $('#navButtons');
  nav.textContent = '';
  var totalSteps = ctx.cookingSteps.length;

  var backBtn = document.createElement('button');
  backBtn.className = 'nav-btn nav-btn-back';
  backBtn.textContent = '\u2190 ' + I18N.nav.back;
  backBtn.disabled = ctx.currentStep <= 0;
  backBtn.setAttribute('aria-label', I18N.nav.back + ' \u2014 ' + I18N.labels.step + ' ' + ctx.currentStep);
  backBtn.addEventListener('click', function() { actor.send({ type: 'PREV_STEP' }); });
  nav.appendChild(backBtn);

  var nextBtn = document.createElement('button');
  nextBtn.className = 'nav-btn nav-btn-next';
  nextBtn.textContent = I18N.nav.next + ' \u2192';
  nextBtn.disabled = ctx.currentStep >= totalSteps - 1;
  nextBtn.setAttribute('aria-label', I18N.nav.next + ' \u2014 ' + I18N.labels.step + ' ' + (ctx.currentStep + 2));
  nextBtn.addEventListener('click', function() { actor.send({ type: 'NEXT_STEP' }); });
  nav.appendChild(nextBtn);
}

function renderAwareness(ctx) {
  var bar = $('#awarenessBar');
  if (!bar) return;
  var timerIds = Object.keys(ctx.timerStates);
  bar.textContent = '';
  if (timerIds.length === 0) return;

  timerIds.forEach(function(opId) {
    var t = ctx.timerStates[opId];
    var op = getOperation(opId);
    var label = op ? capitalize(op.action) : capitalize(opId);

    var pill = document.createElement('span');
    pill.className = 'awareness-pill' + (t.done ? ' done' : '');
    pill.addEventListener('click', function() { actor.send({ type: 'CANCEL_TIMER', opId: opId }); });

    if (t.done) {
      pill.textContent = '\u2705 ' + label + ' \u2014 ' + I18N.labels.timerDone;
    } else {
      pill.textContent = '\uD83C\uDF72 ' + label + ' \u2014 ' + formatTimerDisplay(t.remaining) + ' ' + I18N.labels.remaining;
    }
    bar.appendChild(pill);
  });
}

function renderTimerInFocusCard(ctx) {
  // Surgically update timer button text without re-rendering the whole card
  var buttons = document.querySelectorAll('.timer-btn, .context-timer-btn');
  buttons.forEach(function(btn) {
    var opId = btn.dataset.opId;
    if (!opId) return;
    var timerState = ctx.timerStates[opId];
    if (!timerState) return;
    if (btn.classList.contains('context-timer-btn')) {
      if (timerState && !timerState.done) {
        btn.className = 'context-timer-btn running';
        btn.textContent = '\u23F2 ' + formatTimerDisplay(timerState.remaining);
      } else if (timerState.done) {
        btn.className = 'context-timer-btn';
        btn.textContent = '\u2705 ' + (I18N.labels.timerDone || 'Done');
      }
    } else {
      if (timerState && !timerState.done) {
        btn.className = 'timer-btn running';
        btn.textContent = '\u23F2 ' + formatTimerDisplay(timerState.remaining) + ' \u2014 tap to cancel';
      } else if (timerState.done) {
        btn.className = 'timer-btn running';
        btn.textContent = '\u2705 ' + I18N.labels.timerDone;
      }
    }
  });
}

/* ===================================================================
   STATE PERSISTENCE (localStorage)
   =================================================================== */
var STORAGE_KEY = 'recipe-state-' + RECIPE.meta.slug;

function saveState(snapshot) {
  try {
    var ctx = snapshot.context;
    var saved = {
      view: snapshot.value.view,
      mode: ctx.mode,
      servings: ctx.servings,
      currentStep: ctx.currentStep,
      // Store timers with absolute endTime for clock-based restore
      timers: {},
      savedAt: Date.now(),
    };
    Object.keys(ctx.timerStates).forEach(function(opId) {
      var t = ctx.timerStates[opId];
      if (!t.done) {
        saved.timers[opId] = {
          total: t.total,
          endTime: Date.now() + (t.remaining * 1000),
        };
      }
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  } catch (e) { /* localStorage unavailable */ }
}

function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    var saved = JSON.parse(raw);
    // Discard state older than 24 hours
    if (Date.now() - saved.savedAt > 24 * 60 * 60 * 1000) {
      localStorage.removeItem(STORAGE_KEY);
      return null;
    }
    return saved;
  } catch (e) { return null; }
}

/* ===================================================================
   ACTOR + SUBSCRIPTION
   =================================================================== */
const actor = createActor(recipeMachine);
let prev = actor.getSnapshot();

actor.subscribe((snapshot) => {
  const curr = snapshot;
  const ctx = curr.context;
  const prevCtx = prev.context;
  const currView = curr.value.view;
  const prevView = prev.value.view;

  // Always update header if mode changes
  if (prevCtx.mode !== ctx.mode) {
    renderHeader(ctx, currView === 'cooking');
    renderModeToggle(ctx);
  }

  // Servings changed
  if (prevCtx.servings !== ctx.servings) {
    updateServingsCount(ctx.servings);
    if (currView === 'overview') renderPhases(ctx);
    if (currView === 'cooking') renderFocusArea(ctx);
  }

  // View changed
  if (prevView !== currView) {
    renderViewTabs(currView);
    toggleViewVisibility(currView);
    renderHeader(ctx, currView === 'cooking');
    $('#servingsAdjuster').style.display = currView === 'cooking' ? 'none' : 'flex';
    if (currView === 'overview') {
      renderModeToggle(ctx);
      renderEquipment();
      renderPhases(ctx);
      $('#navButtons').style.display = 'none';
      releaseWakeLock();
    }
    if (currView === 'cooking') {
      renderFocusArea(ctx);
      renderAwareness(ctx);
      renderNavButtons(ctx);
      $('#navButtons').style.display = 'flex';
      requestWakeLock();
    }
  }

  // Mode changed (same view)
  if (prevCtx.mode !== ctx.mode && prevView === currView) {
    if (currView === 'overview') renderPhases(ctx);
    if (currView === 'cooking') renderFocusArea(ctx);
  }

  // Step changed
  if (currView === 'cooking' && prevCtx.currentStep !== ctx.currentStep) {
    renderFocusArea(ctx);
    renderNavButtons(ctx);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // Timer states changed
  if (prevCtx.timerStates !== ctx.timerStates) {
    if (currView === 'cooking') {
      renderAwareness(ctx);
      // If a timer was added or removed, full re-render focus card (button state changes)
      // If just a tick (same timer count), surgically update text only
      var prevTimerCount = Object.keys(prevCtx.timerStates).length;
      var currTimerCount = Object.keys(ctx.timerStates).length;
      var timerDoneChanged = Object.keys(ctx.timerStates).some(function(id) {
        return prevCtx.timerStates[id] && !prevCtx.timerStates[id].done && ctx.timerStates[id].done;
      });
      if (prevTimerCount !== currTimerCount || timerDoneChanged) {
        renderFocusArea(ctx);
      } else {
        renderTimerInFocusCard(ctx);
      }
    }
  }

  // cookingSteps changed (mode change while in cooking)
  if (prevCtx.cookingSteps !== ctx.cookingSteps && prevView === currView && currView === 'cooking') {
    renderFocusArea(ctx);
    renderNavButtons(ctx);
  }

  // Persist state (throttled: save at most once per second)
  if (!saveState._pending) {
    saveState._pending = true;
    setTimeout(function() { saveState._pending = false; saveState(curr); }, 1000);
  }

  prev = curr;
});

/* ===================================================================
   VISIBILITY CHANGE: re-acquire wake lock when tab regains focus
   =================================================================== */
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') {
    var snapshot = actor.getSnapshot();
    if (snapshot.value.view === 'cooking') {
      requestWakeLock();
    }
  }
});

/* ===================================================================
   KEYBOARD NAVIGATION
   =================================================================== */
document.addEventListener('keydown', function(e) {
  var snapshot = actor.getSnapshot();
  if (snapshot.value.view !== 'cooking') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    actor.send({ type: 'NEXT_STEP' });
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    actor.send({ type: 'PREV_STEP' });
  }
});

/* ===================================================================
   SWIPE NAVIGATION (mobile)
   =================================================================== */
var touchStartX = 0;
var touchStartY = 0;
document.addEventListener('touchstart', function(e) {
  touchStartX = e.changedTouches[0].screenX;
  touchStartY = e.changedTouches[0].screenY;
}, { passive: true });

document.addEventListener('touchend', function(e) {
  var snapshot = actor.getSnapshot();
  if (snapshot.value.view !== 'cooking') return;
  var dx = e.changedTouches[0].screenX - touchStartX;
  var dy = e.changedTouches[0].screenY - touchStartY;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0) actor.send({ type: 'NEXT_STEP' });
    else actor.send({ type: 'PREV_STEP' });
  }
}, { passive: true });

/* ===================================================================
   INIT
   =================================================================== */
actor.start();

// Restore saved state
var saved = loadState();
if (saved) {
  if (saved.mode && saved.mode !== 'relaxed') {
    actor.send({ type: 'SET_MODE', mode: saved.mode });
  }
  if (saved.servings && saved.servings !== RECIPE.meta.servings) {
    var delta = saved.servings - RECIPE.meta.servings;
    actor.send({ type: 'ADJUST_SERVINGS', delta: delta });
  }
  if (saved.view === 'cooking') {
    actor.send({ type: 'SWITCH_VIEW', view: 'cooking' });
    // Restore step position (send NEXT_STEP repeatedly — simple and correct)
    var targetStep = saved.currentStep || 0;
    for (var i = 0; i < targetStep; i++) {
      actor.send({ type: 'NEXT_STEP' });
    }
  }
  // Restore running timers
  if (saved.timers) {
    Object.keys(saved.timers).forEach(function(opId) {
      var t = saved.timers[opId];
      var remainingMs = t.endTime - Date.now();
      if (remainingMs > 1000) {
        var remainingSec = Math.round(remainingMs / 1000);
        actor.send({ type: 'START_TIMER', opId: opId, seconds: remainingSec });
      }
      // If timer expired while page was closed, don't re-spawn (it's done)
    });
  }
}

// Initial full render
const initial = actor.getSnapshot();
var initialView = initial.value.view;
renderHeader(initial.context, initialView === 'cooking');
renderServings(initial.context);
$('#servingsAdjuster').style.display = initialView === 'cooking' ? 'none' : 'flex';
renderViewTabs(initialView);
toggleViewVisibility(initialView);
if (initialView === 'overview') {
  renderModeToggle(initial.context);
  renderEquipment();
  renderPhases(initial.context);
  $('#navButtons').style.display = 'none';
} else {
  renderFocusArea(initial.context);
  renderAwareness(initial.context);
  renderNavButtons(initial.context);
  $('#navButtons').style.display = 'flex';
}

// Service Worker registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('{{SW_PATH}}');
}
</script>
</body>
