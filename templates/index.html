<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="{{MANIFEST_PATH}}">
<link rel="apple-touch-icon" href="{{ICON_PATH}}">
<title>All Recipes</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    line-height: 1.5;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
  }

  header {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    color: #f4a261;
    margin-bottom: 0.25rem;
  }

  .recipe-count {
    font-size: 0.875rem;
    color: #888;
  }

  .search-bar {
    margin-bottom: 1rem;
  }

  .search-bar input {
    width: 100%;
    padding: 0.625rem 1rem;
    border-radius: 8px;
    border: 1px solid #3a3a5a;
    background: #2a2a4a;
    color: #e0e0e0;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar input::placeholder { color: #777; }
  .search-bar input:focus { border-color: #4ecdc4; }

  .tag-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0.375rem;
    margin-bottom: 1.25rem;
  }

  .tag-pill {
    display: inline-block;
    padding: 0.25rem 0.625rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid #3a3a5a;
    background: #2a2a4a;
    color: #aaa;
    transition: all 0.2s;
    user-select: none;
  }

  .tag-pill:hover { border-color: #4ecdc4; color: #e0e0e0; }
  .tag-pill.active {
    background: #4ecdc4;
    color: #1a1a2e;
    border-color: #4ecdc4;
    font-weight: 600;
  }

  .recipe-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
  }

  @media (min-width: 520px) {
    .recipe-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (min-width: 800px) {
    .recipe-grid { grid-template-columns: repeat(3, 1fr); }
  }

  .recipe-card {
    background: #2a2a4a;
    border-radius: 10px;
    padding: 1.125rem;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 0.625rem;
    transition: transform 0.15s, box-shadow 0.15s;
    border: 1px solid transparent;
  }

  .recipe-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    border-color: #3a3a5a;
  }

  .recipe-card h2 {
    font-size: 1.05rem;
    font-weight: 600;
    color: #f0f0f0;
    line-height: 1.3;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.25rem;
  }

  .card-tag {
    font-size: 0.675rem;
    padding: 0.125rem 0.5rem;
    border-radius: 999px;
    background: rgba(78, 205, 196, 0.12);
    color: #4ecdc4;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.5rem;
    margin-top: auto;
    font-size: 0.8rem;
    color: #999;
  }

  .badge {
    display: inline-block;
    padding: 0.125rem 0.5rem;
    border-radius: 999px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: capitalize;
  }

  .badge-easy { background: rgba(76, 175, 80, 0.18); color: #66bb6a; }
  .badge-medium { background: rgba(255, 152, 0, 0.18); color: #ffa726; }
  .badge-hard { background: rgba(244, 67, 54, 0.18); color: #ef5350; }

  .meta-sep { color: #444; }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: #666;
    font-size: 1.05rem;
    grid-column: 1 / -1;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1 id="page-title">All Recipes</h1>
    <div class="recipe-count" id="recipe-count"></div>
  </header>

  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search recipes...">
  </div>

  <div class="tag-filters" id="tag-filters"></div>

  <div class="recipe-grid" id="recipe-grid"></div>
</div>

<script>
  const RECIPES = {{RECIPES_JSON}};
  const I18N = {{I18N_JSON}};

  (function () {
    var labels = I18N.labels || {};

    // Apply i18n strings
    var titleEl = document.getElementById('page-title');
    if (labels.allRecipes) titleEl.textContent = labels.allRecipes;

    var searchInput = document.getElementById('search-input');
    if (labels.searchPlaceholder) searchInput.placeholder = labels.searchPlaceholder;

    // Collect all unique tags, sorted
    var tagSet = {};
    RECIPES.forEach(function (r) {
      (r.tags || []).forEach(function (t) { tagSet[t] = true; });
    });
    var allTags = Object.keys(tagSet).sort();

    var activeTags = {};

    function removeAllChildren(el) {
      while (el.firstChild) el.removeChild(el.firstChild);
    }

    // Render tag filter pills
    var tagContainer = document.getElementById('tag-filters');
    function renderTags() {
      removeAllChildren(tagContainer);
      allTags.forEach(function (tag) {
        var pill = document.createElement('span');
        pill.className = 'tag-pill' + (activeTags[tag] ? ' active' : '');
        pill.textContent = tag;
        pill.addEventListener('click', function () {
          if (activeTags[tag]) {
            delete activeTags[tag];
          } else {
            activeTags[tag] = true;
          }
          renderTags();
          renderGrid();
        });
        tagContainer.appendChild(pill);
      });
    }

    function getFilteredRecipes() {
      var query = searchInput.value.toLowerCase().trim();
      var activeTagList = Object.keys(activeTags);

      var filtered = RECIPES.filter(function (r) {
        // Text search across title and tags
        if (query) {
          var haystack = (r.title || '').toLowerCase() + ' ' + (r.tags || []).join(' ').toLowerCase();
          if (haystack.indexOf(query) === -1) return false;
        }
        // Tag filter (AND)
        if (activeTagList.length > 0) {
          var rTags = r.tags || [];
          for (var i = 0; i < activeTagList.length; i++) {
            if (rTags.indexOf(activeTagList[i]) === -1) return false;
          }
        }
        return true;
      });

      // Sort alphabetically by title
      filtered.sort(function (a, b) {
        return (a.title || '').localeCompare(b.title || '');
      });

      return filtered;
    }

    function addSeparator(parent) {
      var sep = document.createElement('span');
      sep.className = 'meta-sep';
      sep.textContent = '\u00B7';
      parent.appendChild(sep);
    }

    function renderGrid() {
      var grid = document.getElementById('recipe-grid');
      var recipes = getFilteredRecipes();

      // Update count
      var countEl = document.getElementById('recipe-count');
      countEl.textContent = recipes.length + ' ' + (recipes.length === 1 ? 'recipe' : 'recipes');

      removeAllChildren(grid);

      if (recipes.length === 0) {
        var empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = labels.noResults || 'No recipes found';
        grid.appendChild(empty);
        return;
      }

      recipes.forEach(function (r) {
        var card = document.createElement('a');
        card.className = 'recipe-card';
        card.href = r.url || '#';

        // Title
        var h2 = document.createElement('h2');
        h2.textContent = r.title || '';
        card.appendChild(h2);

        // Tags
        if (r.tags && r.tags.length) {
          var tagsDiv = document.createElement('div');
          tagsDiv.className = 'card-tags';
          r.tags.forEach(function (t) {
            var span = document.createElement('span');
            span.className = 'card-tag';
            span.textContent = t;
            tagsDiv.appendChild(span);
          });
          card.appendChild(tagsDiv);
        }

        // Meta row: difficulty, time, servings
        var meta = document.createElement('div');
        meta.className = 'card-meta';

        if (r.difficulty) {
          var badge = document.createElement('span');
          badge.className = 'badge badge-' + r.difficulty;
          badge.textContent = r.difficulty;
          meta.appendChild(badge);
        }

        if (r.totalTime) {
          if (meta.children.length) addSeparator(meta);
          var time = document.createElement('span');
          var timeVal = typeof r.totalTime === 'object' ? (r.totalTime.optimized || r.totalTime.relaxed) : r.totalTime;
          time.textContent = timeVal + ' ' + (labels.minutes || 'min');
          meta.appendChild(time);
        }

        if (r.servings) {
          if (meta.children.length) addSeparator(meta);
          var srv = document.createElement('span');
          srv.textContent = r.servings + ' ' + (labels.servings || 'servings').toLowerCase();
          meta.appendChild(srv);
        }

        card.appendChild(meta);
        grid.appendChild(card);
      });
    }

    // Bind search
    searchInput.addEventListener('input', renderGrid);

    // Initial render
    renderTags();
    renderGrid();
  })();

  // Service Worker registration
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('{{SW_PATH}}');
  }
</script>

</body>
</html>
